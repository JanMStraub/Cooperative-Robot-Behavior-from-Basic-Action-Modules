# OMPL planner configs for AR4 mk3
#
# Contains the nested planner_configs/arm/gripper blocks which cannot be
# expressed as ROS 2 launch parameter scalars.
# Uses /**:  so params apply to any namespaced move_group node (Robot1, Robot2).
# The "ompl." prefix matches the named pipeline declared in move_group.launch.py
# via planning_pipelines: "ompl".
/**:
  ros__parameters:
    # Declare the named planning pipeline. move_group reads this as a string_array
    # and registers a pipeline named "ompl", which MotionPlanRequest.pipeline_id
    # can then reference. Must live in a YAML file — the ROS 2 launch inline dict
    # only accepts scalar types and cannot represent string_array.
    planning_pipelines:
      - ompl

    ompl.planner_configs:
      RRTConnect:
        type: geometric::RRTConnect
        range: 0.0
      RRTstar:
        type: geometric::RRTstar
        range: 0.0
      PRM:
        type: geometric::PRM
        max_nearest_neighbors: 10
      EST:
        type: geometric::EST
        range: 0.0
        goal_bias: 0.05

    ompl.arm:
      default_planner_config: RRTConnect
      planner_configs:
        - RRTConnect
        - RRTstar
        - PRM
        - EST
      projection_evaluator: joints(joint_1, joint_2)
      longest_valid_segment_fraction: 0.05

    ompl.gripper:
      default_planner_config: RRTConnect
      planner_configs:
        - RRTConnect
