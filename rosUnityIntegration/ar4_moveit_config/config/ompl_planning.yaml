# OMPL planning configuration for AR4 mk3
# Force OMPL as the default planning plugin (supports pose goals, unlike CHOMP)
#
# NOTE on namespace: In MoveIt 2 (Humble), planning pipeline parameters (plugin,
# adapters) must live under move_group: ros__parameters: (node-specific namespace),
# NOT under /**:. Using /**:  causes the adapters to be silently ignored, which
# means FixStartStateBounds never runs and any start state slightly outside joint
# limits causes "invalid start state" / OMPL initialisation failure.
move_group:
  ros__parameters:
    planning_plugin: ompl_interface/OMPLPlanner
    # MoveIt 2 (Humble) separates adapters into request (pre-planning) and response
    # (post-planning). AddTimeOptimalParameterization is a RESPONSE adapter that runs
    # after OMPL returns a path and stamps it with velocity/acceleration-consistent
    # time parameters — which is what makes max_velocity_scaling_factor effective.
    request_adapters: >-
      default_planning_request_adapters/ResolveConstraintFrames
      default_planning_request_adapters/FixWorkspaceBounds
      default_planning_request_adapters/FixStartStateBounds
      default_planning_request_adapters/FixStartStateCollision
      default_planning_request_adapters/FixStartStatePathConstraints
    response_adapters: >-
      default_planning_response_adapters/AddTimeOptimalParameterization
      default_planning_response_adapters/ValidateSolution
      default_planning_response_adapters/DisplayMotionPath
    # Tolerance for clamping start state joint positions back within URDF limits.
    # 0.5 rad (~28°) is generous enough to handle Unity ArticulationBody numerical
    # noise and normal resting poses near joint boundaries, without allowing truly
    # invalid configurations (full limit violations are ~1-3 rad for this robot).
    start_state_max_bounds_error: 0.5

/**:
  ros__parameters:
    planner_configs:
      RRTConnect:
        type: geometric::RRTConnect
        range: 0.0
      RRTstar:
        type: geometric::RRTstar
        range: 0.0
      PRM:
        type: geometric::PRM
        max_nearest_neighbors: 10
      EST:
        type: geometric::EST
        range: 0.0
        goal_bias: 0.05

    arm:
      default_planner_config: RRTConnect
      planner_configs:
        - RRTConnect
        - RRTstar
        - PRM
        - EST
      projection_evaluator: joints(joint_1, joint_2)
      longest_valid_segment_fraction: 0.015

    gripper:
      default_planner_config: RRTConnect
      planner_configs:
        - RRTConnect
